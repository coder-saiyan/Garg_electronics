<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All Products - Garg Electronics Varanasi</title>
    <meta name="description" content="Browse 800+ Arduino, Motors, Inverters, Sensors and DIY products at Garg Electronics Varanasi. Fast search and filters.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }

        .section-heading {
            position: relative;
            display: inline-block;
        }
        
        .section-heading::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 65px;
            height: 3.5px;
            background: linear-gradient(to right, #0066CC, #00D4FF);
            border-radius: 4px;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 102 204 / 0.18);
        }

        .buy-btn {
            transition: all 0.3s ease;
        }
        
        .buy-btn:hover {
            background-color: #166534;
            transform: scale(1.08);
        }
    </style>
</head>
<body class="bg-white text-slate-800">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow">
                    ⚡
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter text-blue-700">GARG ELECTRONICS</h1>
                    <p class="text-xs text-slate-500 -mt-1">Varanasi, Uttar Pradesh</p>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-9 text-sm font-medium">
                <a href="index.html" class="hover:text-blue-600 transition">Home</a>
                <a href="shop.html" class="text-blue-600 font-semibold transition">Shop</a>
                <a href="blog.html" class="hover:text-blue-600 transition">Blog</a>
            </div>

            <a href="https://wa.me/919876543210" target="_blank" 
               class="bg-green-500 hover:bg-green-600 text-white px-8 py-3.5 rounded-3xl flex items-center gap-3 font-semibold transition">
                <i class="fa-brands fa-whatsapp text-2xl"></i>
                <span>WhatsApp</span>
            </a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <!-- Page Heading -->
        <div class="mb-10">
            <span class="uppercase text-blue-600 text-sm font-medium tracking-widest">Discover</span>
            <h1 class="section-heading text-4xl md:text-5xl font-bold text-slate-900 mt-2">All Products</h1>
            <p class="text-slate-600 mt-3 text-lg">800+ genuine electronics & DIY components</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Filters Sidebar -->
            <div class="lg:w-72 bg-white border border-slate-200 rounded-3xl p-7 h-fit sticky top-24">
                <h2 class="font-semibold text-xl mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-sliders"></i> Filters
                </h2>
                
                <div class="mb-8">
                    <h3 class="text-sm font-medium text-slate-500 mb-4">CATEGORY</h3>
                    <div id="categoryFilters" class="space-y-3 text-sm"></div>
                </div>

                <div class="mb-8">
                    <h3 class="text-sm font-medium text-slate-500 mb-4">PRICE RANGE</h3>
                    <div class="flex gap-4">
                        <input id="minPrice" type="number" placeholder="Min ₹" 
                               class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:border-blue-500 outline-none">
                        <input id="maxPrice" type="number" placeholder="Max ₹" 
                               class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="inStockOnly" class="w-5 h-5 accent-blue-600">
                    <span class="font-medium text-slate-700">Show In Stock Only</span>
                </label>
            </div>

            <!-- Main Content -->
            <div class="flex-1">
                <!-- Search Bar -->
                <div class="relative mb-10">
                    <input id="searchInput" type="text" 
                           class="w-full bg-white border border-slate-300 focus:border-blue-500 rounded-3xl px-6 py-5 pl-14 text-lg outline-none"
                           placeholder="Search Arduino, Motor, Inverter, Sensor...">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-6 text-slate-400 text-2xl"></i>
                </div>

                <div id="resultCount" class="font-semibold text-xl mb-8 text-slate-700"></div>

                <!-- Products Grid -->
                <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== YOUR PRODUCTS ====================
        let products = [
            { id: 1, name: "Arduino Uno R3 Original", category: "Arduino", price: 649, stock: true, image: "UNO.jpeg" },
            { id: 2, name: "6V 125RPM Metal Gear Motor", category: "Motors", price: 349, stock: true, image: "🌀" },
            { id: 3, name: "L298N Dual Motor Driver", category: "Drivers", price: 189, stock: false, image: "⚙️" },
            { id: 4, name: "HC-SR04 Ultrasonic Sensor", category: "Sensors", price: 119, stock: true, image: "📡" },
            { id: 5, name: "12V 7Ah Inverter Battery", category: "Inverters", price: 849, stock: true, image: "🔋" },
            { id: 6, name: "ESP32 WiFi Development Board", category: "Arduino", price: 449, stock: true, image: "📟" },
            // Add your remaining 800+ products here in same format
        ];

        const categories = ["Arduino", "Motors", "Drivers", "Sensors", "Inverters", "DIY Kits", "Solar"];

        function renderCategories() {
            const container = document.getElementById("categoryFilters");
            container.innerHTML = categories.map(cat => `
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="category-check accent-blue-600" value="${cat}">
                    <span class="text-slate-700">${cat}</span>
                </label>
            `).join("");
        }

        function renderProducts(filtered) {
            const grid = document.getElementById("productGrid");
            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-white border border-slate-200 rounded-3xl overflow-hidden">
                    <div class="h-60 flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 text-8xl">
                        ${p.image}
                    </div>
                    <div class="p-6">
                        <h3 class="font-semibold text-lg leading-tight">${p.name}</h3>
                        <p class="text-slate-500 text-sm mt-1">${p.category}</p>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-3xl font-bold text-blue-700">₹${p.price}</span>
                            ${!p.stock ? `<span class="text-red-600 text-xs font-medium px-3 py-1 bg-red-100 rounded-xl">Out of Stock</span>` : ''}
                        </div>
                        <a href="https://wa.me/919876543210?text=I%20want%20to%20buy%20${encodeURIComponent(p.name)}%20for%20₹${p.price}" 
                           target="_blank"
                           class="buy-btn mt-4 block w-full bg-green-600 text-white text-center py-3.5 rounded-2xl text-sm font-semibold flex items-center justify-center gap-2">
                            <i class="fa-brands fa-whatsapp"></i> Buy Now
                        </a>
                    </div>
                </div>
            `).join("");

            document.getElementById("resultCount").innerHTML = 
                `Showing <span class="text-blue-600">${filtered.length}</span> of ${products.length} products`;
        }

        function filterProducts() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase().trim();
            const minPrice = parseFloat(document.getElementById("minPrice").value) || 0;
            const maxPrice = parseFloat(document.getElementById("maxPrice").value) || Infinity;
            const inStockOnly = document.getElementById("inStockOnly").checked;
            const checkedCategories = Array.from(document.querySelectorAll(".category-check:checked")).map(cb => cb.value);

            const filtered = products.filter(p => {
                const matchSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
                const matchCategory = checkedCategories.length === 0 || checkedCategories.includes(p.category);
                const matchPrice = p.price >= minPrice && p.price <= maxPrice;
                const matchStock = !inStockOnly || p.stock === true;
                return matchSearch && matchCategory && matchPrice && matchStock;
            });

            renderProducts(filtered);
        }

        // Initialize
        window.onload = () => {
            renderCategories();
            renderProducts(products);

            // Live filtering
            document.getElementById("searchInput").addEventListener("input", filterProducts);
            document.getElementById("minPrice").addEventListener("input", filterProducts);
            document.getElementById("maxPrice").addEventListener("input", filterProducts);
            document.getElementById("inStockOnly").addEventListener("change", filterProducts);
            document.getElementById("categoryFilters").addEventListener("change", filterProducts);
        };
    </script>
</body>
</html>
